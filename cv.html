<body data-page="cv"
    class="bg-gray-100 text-gray-900 dark:bg-dark-bg dark:text-dark-text transition-colors duration-200 font-sans">
    <a href="#cv_content"

    <nav class="sticky top-0 z-40 bg-blue-600/95 dark:bg-blue-800/90 backdrop-blur shadow-lg">
        <div class="page-shell flex items-center justify-between gap-3 py-2.5">
            <ul id="navbar" class="flex min-w-0 flex-1 gap-1.5 overflow-x-auto whitespace-nowrap nav-scroll">
                <!-- filled by cv.js -->
            </ul>
            <button id="darkModeToggle" aria-label="Toggle dark mode"

                </svg>
            </button>
        </div>

    <header class="bg-blue-700 dark:bg-blue-900 text-white py-8 shadow">
        <div class="page-shell">
            <div class="flex flex-col lg:flex-row items-center lg:items-start gap-6">
                <div id="picture"
                    class="w-32 h-48 md:w-40 md:h-60 shrink-0 overflow-hidden rounded-3xl shadow-2xl ring-2 ring-white/30">
                    <a href="debasish_photo_full.jpeg" target="_blank" rel="noopener">
                        <img src="debasish_photo.jpeg" alt="Profile picture"
                            class="block w-full h-full object-cover object-top" />

                </div>
                <div class="flex-1 text-center lg:text-left">
                    <p class="text-sm uppercase tracking-[0.25em] text-blue-200">Curriculum Vitae</p>
                    <h1 id="name" class="mt-2 text-4xl font-extrabold tracking-tight"></h1>
                    <h2 id="name_odia" class="text-xl mt-2 font-semibold"></h2>
                    <h3 id="position" class="text-lg mt-5 font-semibold"></h3>
                    <div id="links" class="mt-4 flex flex-wrap items-center justify-center lg:justify-start gap-3"></div>
                </div>
                <div id="header_address_container"
                    class="hidden lg:block text-right self-center lg:self-start bg-blue-800/60 p-4 rounded-xl backdrop-blur-sm border border-blue-500/40 shadow-lg max-w-xs shrink-0">
                </div>
            </div>
        </div>
    </header>

    <main class="page-shell py-10 md:py-12">
        <div id="cv_content" class="space-y-8"></div>
    </main>

    <footer id="site_footer" class="mt-12 bg-blue-800 dark:bg-blue-950 text-white"></footer>

    <button id="goToTop" aria-label="Scroll to top"
        class="fixed bottom-6 right-6 bg-blue-600 hover:bg-blue-700 text-white font-bold p-3 rounded-full shadow-lg hidden focus-visible:ring">

    <script type="module" src="cv.js"></script>

</html>
