<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Full list of publications by Debasish Pattanayak, including journals, conferences, and preprints in distributed algorithms and mobile robots.">
    <link rel="canonical" href="https://drdebmath.github.io/publications.html">
    <meta property="og:title" content="Publications - Debasish Pattanayak">
    <meta property="og:description"
        content="Journals, conferences, and preprints on distributed algorithms, mobile agents, and swarm robotics.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://drdebmath.github.io/publications.html">
    <meta property="og:image" content="https://drdebmath.github.io/debasish_photo.jpeg">
    <meta name="twitter:card" content="summary">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <title>Publications - Debasish Pattanayak</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/site.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
        crossorigin="anonymous"></script>
</head>

<body data-page="publications"
    class="bg-gray-100 text-gray-900 dark:bg-dark-bg dark:text-dark-text transition-colors duration-200 font-sans">

    <a href="#publications"
        class="sr-only focus:not-sr-only fixed top-2 left-2 z-50 bg-white dark:bg-gray-800 text-blue-700 dark:text-blue-300 px-3 py-1 rounded shadow">Skip
        to content</a>

    <nav class="sticky top-0 z-40 bg-blue-600/95 dark:bg-blue-800/90 backdrop-blur shadow-lg">
        <div class="page-shell flex items-center justify-between gap-3 py-2.5">
            <ul id="navbar" class="flex min-w-0 flex-1 gap-1.5 overflow-x-auto whitespace-nowrap nav-scroll">
                <!-- filled by script.js -->
            </ul>
            <div class="relative shrink-0 w-40 sm:w-52 md:w-64">
                <form id="site_search_form" role="search">
                    <label for="site_search_input" class="sr-only">Search publications</label>
                    <input id="site_search_input" type="search" placeholder="Search publications…" autocomplete="off"
                        aria-controls="site_search_results" aria-expanded="false"
                        class="w-full rounded-full border-0 bg-white/95 dark:bg-gray-800 text-gray-900 dark:text-gray-100 text-sm px-3 py-1.5 shadow focus:outline-none focus-visible:ring-2 focus-visible:ring-white" />
                </form>
                <div id="site_search_results"
                    class="hidden absolute right-0 mt-1 w-72 sm:w-80 max-h-80 overflow-y-auto rounded-xl bg-white dark:bg-gray-800 shadow-xl border border-gray-200 dark:border-gray-700 z-50">
                </div>
            </div>
            <button id="darkModeToggle" aria-label="Toggle dark mode"
                class="shrink-0 p-2 rounded-full bg-gray-200 dark:bg-gray-700 focus:outline-none focus-visible:ring">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-yellow-500 dark:text-white"
                    viewBox="0 0 20 20" fill="currentColor">
                    <path
                        d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" />
                </svg>
            </button>
        </div>
    </nav>

    <header class="bg-blue-700 dark:bg-blue-900 text-white py-8 shadow">
        <div class="page-shell">
            <p class="text-sm uppercase tracking-[0.25em] text-blue-200">Academic Portfolio</p>
            <h1 class="mt-2 text-3xl sm:text-4xl font-extrabold tracking-tight">Publications</h1>
            <p class="mt-3 max-w-2xl text-blue-100">
                Full list of journal articles, conference papers, posters, and preprints.
                Group by year, type, or research topic.
            </p>
        </div>
    </header>

    <main class="page-shell py-10 md:py-12">
        <section id="publications">
            <div class="mb-6 inline-flex rounded-full border border-blue-200 dark:border-blue-800 bg-white dark:bg-gray-800 shadow-md overflow-hidden">
                <button id="group_by_year" aria-label="Group publications by year" aria-pressed="true"
                    class="py-1.5 px-4 text-sm font-semibold transition-colors bg-blue-600 text-white">By
                    year</button>
                <button id="group_by_type" aria-label="Group publications by type" aria-pressed="false"
                    class="py-1.5 px-4 text-sm font-semibold transition-colors text-blue-700 dark:text-blue-300 hover:bg-blue-50 dark:hover:bg-gray-700">By
                    type</button>
                <button id="group_by_topic" aria-label="Group publications by topic" aria-pressed="false"
                    class="py-1.5 px-4 text-sm font-semibold transition-colors text-blue-700 dark:text-blue-300 hover:bg-blue-50 dark:hover:bg-gray-700">By
                    topic</button>
            </div>
            <div id="publications_list" class="mt-6"></div>
        </section>
    </main>

    <footer id="site_footer" class="mt-12 bg-blue-800 dark:bg-blue-950 text-white"></footer>

    <button id="goToTop" aria-label="Scroll to top"
        class="fixed bottom-6 right-6 bg-blue-600 hover:bg-blue-700 text-white font-bold p-3 rounded-full shadow-lg hidden focus-visible:ring">
        ↑
    </button>

    <script type="module" src="script.js"></script>
</body>

</html>
